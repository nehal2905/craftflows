  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How much does it cost?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A fixed build fee, quoted up front after the audit, based on the workflow's complexity, plus a monthly retainer for monitoring and maintenance. No hourly billing, no surprises. And if the automation doesn't save the hours we promised, you don't pay."
        }
      },
      {
        "@type": "Question",
        "name": "How long does a build take?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Most automations ship in one to three weeks from kickoff. The audit itself takes 15 minutes, and you'll have a scoped proposal within two business days of it."
        }
      },
      {
        "@type": "Question",
        "name": "What software do you work with?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The tools businesses already run: Slack, Notion, HubSpot, Airtable, Google Workspace, Asana, ClickUp, Stripe, and hundreds more via Zapier, Make, or direct APIs. If your stack has an API, we can almost certainly wire it in."
        }
      },
      {
        "@type": "Question",
        "name": "What happens when something breaks?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "That's what the retainer covers. Every flow is monitored around the clock, when an upstream tool changes its API or a step fails, we're alerted and usually have it fixed before your team notices anything."
        }
      },
      {
        "@type": "Question",
        "name": "What kind of support do we get?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A dedicated Slack channel with the people who built your automation, no ticket queues, no outsourced support desk. Questions, tweaks, and small adjustments are part of the retainer."
        }
      },
      {
        "@type": "Question",
        "name": "Can you build custom integrations?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. When an off-the-shelf connector doesn't exist, we write custom API integrations, internal tools, legacy systems, or niche software included. That's scoped and quoted in the same fixed-fee proposal."
        }
      }
    ]
  }
